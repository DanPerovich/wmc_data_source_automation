name: Detect New and Changed CSV Files

on:
  push:
    branches:
      - main # Or your main branch name
    paths:
      - 'data/**' # Watch for changes in the data directory

env:
  WIREMOCK_CLOUD_API_TOKEN: ${{ secrets.WIREMOCK_CLOUD_API_TOKEN }}

jobs:
  check-csv-changes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v37
        with:
          separator: " "
          files: 'data/*.csv'

      - name: Get WireMock Cloud user ID
        id: get-user-id
        run: |
          response=$(curl -s -L -H "Authorization: Token $WIREMOCK_CLOUD_API_TOKEN" \
              https://api.wiremock.cloud/v1/users/self)
          USER_ID=$(echo "$response" | jq -r '.user.id')
          if [ -z "$USER_ID" ] || [ "$USER_ID" = "null" ]; then
            echo "Error: could not extract user ID from response: $response"
            exit 1
          fi
          echo "USER_ID=$USER_ID" >> $GITHUB_ENV

      - name: Check for new and changed CSV files
        id: check-changes
        run: |
          CHANGED_FILES="${{ steps.changed-files.outputs.all_changed_files }}"

          NEW_FILES_COUNT=$(echo "$CHANGED_FILES" | grep -oE '^A\s+data/.*\.csv$' | wc -l)

          echo "new_files_count=$NEW_FILES_COUNT" | tee -a $GITHUB_OUTPUT

          if [[ $NEW_FILES_COUNT -gt 0 ]]; then
            NEW_FILES=$(echo "$CHANGED_FILES" | grep -oE '^A\s+data/.*\.csv$' | cut -d' ' -f2)
            echo "new_csv_files=$NEW_FILES" | tee -a $GITHUB_OUTPUT
          else
            echo "new_csv_files=<null>" | tee -a $GITHUB_OUTPUT
          fi

          # Improved logic for modified files
          MODIFIED_FILES=$(git diff-tree -r --name-only HEAD^ HEAD | grep 'data/.*\.csv$') # Use git diff-tree
          MODIFIED_FILES_COUNT=$(echo "$MODIFIED_FILES" | wc -l)

          echo "modified_files_count=$MODIFIED_FILES_COUNT" | tee -a $GITHUB_OUTPUT

          if [[ $MODIFIED_FILES_COUNT -gt 0 ]]; then
            echo "modified_csv_files=$MODIFIED_FILES" | tee -a $GITHUB_OUTPUT
          else
            echo "modified_csv_files=<null>" | tee -a $GITHUB_OUTPUT
          fi

      - name: Take action on new files
        if: steps.check-changes.outputs.new_files_count > 0
        run: |
          echo "Performing actions on NEW CSV files..."
          NEW_FILES=$(echo "${{ steps.check-changes.outputs.new_csv_files }}")
          for file in $NEW_FILES; do
            echo "Processing new file: $file"
            # Your commands to process each NEW file here
          done

      - name: Take action on modified files
        if: steps.check-changes.outputs.modified_files_count > 0
        run: |
          echo "Performing actions on MODIFIED CSV files..."
          MODIFIED_FILES=$(echo "${{ steps.check-changes.outputs.modified_csv_files }}")
          for file in $MODIFIED_FILES; do
            echo "Processing modified file: $file"

            DS_NAME=$(basename "$file" .csv)
            echo "Searching for existing data source named exactly '${DS_NAME}'..."
            search_response=$(curl -s --request GET \
                -H "Authorization: Token $WIREMOCK_CLOUD_API_TOKEN" \
                --url "https://api.wiremock.cloud/v1/users/${USER_ID}/data-sources?q=${DS_NAME}")

            if [ $? -ne 0 ]; then
                echo "Failed to fetch data sources"
                exit 1
            fi

            data_source_count=$(echo "$search_response" | jq --arg name "$DS_NAME" '[.dataSources[] | select(.name == $name)] | length')

            if [ "$data_source_count" -gt 1 ]; then
                echo "Error: Multiple data sources found with name '${DS_NAME}'. Expected at most one match."
                echo "$search_response" | jq -r --arg name "$DS_NAME" '.dataSources[] | select(.name == $name) | "- ID: \(.id), Name: \(.name)"'
                exit 1
            fi

            # Parse CSV file
            echo "Parsing $file..."
            parsed_response=$(curl -s -X POST \
                -H "Authorization: Token $WIREMOCK_CLOUD_API_TOKEN" \
                -H "Content-Type: text/csv" \
                --data-binary "@$file" \
                https://api.wiremock.cloud/v1/data-sources/parse)

            if [ $? -ne 0 ]; then
                echo "Failed to parse CSV file"
                exit 1
            fi

            modified_response=$(echo "$parsed_response" | jq -c --arg name "$DS_NAME" '.dataSource.name=$name | .dataSource.type="CSV" | {dataSource: .dataSource}')
            echo "Successfully parsed CSV file"

            if [ "$data_source_count" -eq 0 ]; then
                echo "No existing data source found — creating '${DS_NAME}'..."
                create_response=$(curl -s -X POST \
                    -H "Authorization: Token $WIREMOCK_CLOUD_API_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "${modified_response}" \
                    --url "https://api.wiremock.cloud/v1/users/${USER_ID}/data-sources")

                if [ $? -ne 0 ]; then
                    echo "Failed to create data source"
                    exit 1
                fi

                echo "Successfully created data source '${DS_NAME}'"
            else
                DATA_SOURCE_ID=$(echo "$search_response" | jq -r --arg name "$DS_NAME" '.dataSources[] | select(.name == $name) | .id' | tr -d '[:space:]')
                echo "Updating existing data source '${DS_NAME}' (ID: ${DATA_SOURCE_ID})..."
                put_response=$(curl -s -X PUT \
                    -H "Authorization: Token $WIREMOCK_CLOUD_API_TOKEN" \
                    -H "Content-Type: application/json" \
                    -d "${modified_response}" \
                    --url "https://api.wiremock.cloud/v1/data-sources/${DATA_SOURCE_ID}")

                if [ $? -ne 0 ]; then
                    echo "Failed to update data source"
                    exit 1
                fi

                echo "Successfully updated data source '${DS_NAME}'"
            fi
          done